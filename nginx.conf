server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 静的ファイルはそのまま配信
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/ 配下はAPI用Container Appへ転送する
    location /api/ {
        proxy_pass https://steelers-api.livelybush-565b6ae3.japaneast.azurecontainerapps.io/api/;
        proxy_set_header Host steelers-api.livelybush-565b6ae3.japaneast.azurecontainerapps.io;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
